[build]
  base = "site/"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist/"

# Astro static output — optimale caching
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA-style redirects niet nodig — Astro genereert static HTML
# Maar wel: taalredirect en trailing slashes

# Redirect /nl/ naar homepage (NL is default, geen prefix)
[[redirects]]
  from = "/nl/"
  to = "/"
  status = 301

# Pretty 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
